<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>
      Webrion | Web Development & SEO Agency in Ahmedabad, India
    </title>

    <meta
      name="description"
      content="Webrion is a modern web development agency in Ahmedabad offering custom websites, ecommerce development, SEO services, UI/UX design, and web applications."

    <meta

    <meta name="author" content="Webrion" />

    <!-- Favicon -->

    <link
      rel="icon"

      href="/favicon-32x32.png"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png"
    />

      rel="icon"
      type="image/png"
      sizes="96x96"
      href="/favicon-96x96.png"
    />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    />

    <link rel="manifest" href="/site.webmanifest" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Theme -->
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph -->

      property="og:title"

      content="Webrion | Web Development Agency"

      name="twitter:description"

      name="google-site-verification"
      content="eb5ec16bed0ead18"

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <script type="module" src="/src/main.tsx"></script>
